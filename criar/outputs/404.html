<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel Lanches OS</title>
    <script>
      (function redirectToSpaEntry() {
        sessionStorage.setItem("daniel:lanches:redirect", window.location.href);

        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const knownRoutes = ["admin", "cardapio", "checkout", "pedidos", "meus-pedidos", "entregador"];
        const isProjectPage = window.location.hostname.endsWith("github.io") && pathParts.length && !knownRoutes.includes(pathParts[0]);
        const basePath = isProjectPage ? `/${pathParts[0]}/` : "/";

        window.location.replace(`${window.location.origin}${basePath}`);
      })();
    </script>
  </head>
  <body>
    Redirecionando para Daniel Lanches...
  </body>
</html>
